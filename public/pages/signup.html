<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Student Task & Notes Manager</title>
  <meta name="description" content="Sign up for a free Student Task & Notes Manager account to start tracking your school notes and assignments.">
  <link rel="stylesheet" href="/css/style.css">
  
  <script>
    // Immediate theme restoration to prevent screen flash
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="auth-body">
  
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">S</div>
        <h1 class="auth-title" id="signup-h1">Join Us</h1>
        <p class="auth-subtitle">Get started with a secure productivity account</p>
      </div>

      <form id="signup-form">
        <!-- Name Field -->
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <div class="input-container">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <input class="form-input" id="signup-name" type="text" placeholder="e.g. John Doe" required autocomplete="name">
          </div>
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <div class="input-container">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <input class="form-input" id="signup-email" type="email" placeholder="you@university.edu" required autocomplete="email">
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="input-container">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input class="form-input" id="signup-password" type="password" placeholder="Min. 6 characters" required autocomplete="new-password">
            <button class="btn-toggle-password" type="button" aria-label="Toggle Password Visibility">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 18px; height: 18px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Register button -->
        <button class="btn-submit" type="submit">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a class="auth-link" href="/pages/login.html">Log In</a>
      </div>
    </div>
  </div>

  <!-- Include Utility Toasts & Script Controllers -->
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
